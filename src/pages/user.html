<section class="page auth-page" style="max-width: 500px;">
  <div class="auth-header" style="text-align: center;">
    <div id="avatar-container" style="position: relative; width: 100px; height: 100px; margin: 0 auto 16px;">
      <div id="user-avatar-fallback" style="width: 100px; height: 100px; border-radius: 50%; background: var(--brand); color: var(--brand-text); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 600; display: none;"></div>
      <img id="user-avatar" src="" alt="User Avatar" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; position: absolute; top: 0; left: 0;" />
    </div>
    <h1 id="user-welcome">Loading...</h1>
  </div>

  <div id="user-details" style="display: none; text-align: left; width: 100%;" class="auth-form">
    <div style="background: var(--input-bg); border: 1px solid var(--surface-border); border-radius: 8px; padding: 16px;">
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>ID:</strong> <span id="display-id" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>Username:</strong> <span id="display-username" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>Email:</strong> <span id="display-email" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>Role:</strong> <span id="display-role" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>Login Type:</strong> <span id="display-login-type" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>Email Verified:</strong> <span id="display-email-verified" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 8px; color: var(--muted); font-size: 0.85rem;"><strong>Created At:</strong> <span id="display-created" style="color: var(--text);"></span></p>
      <p style="margin-bottom: 0; color: var(--muted); font-size: 0.85rem;"><strong>Updated At:</strong> <span id="display-updated" style="color: var(--text);"></span></p>
    </div>
  </div>

  <form class="auth-form" style="width: 100%;">
    <button type="button" id="logout-btn" class="primary-btn" style="width: 100%;">Log Out</button>
  </form>

  <p id="user-status" class="status" role="status" aria-live="polite"></p>

  <div class="auth-links text-center">
    <a class="nav-link muted" href="/">Back to home</a>
  </div>
</section>
