<section class="page auth-page">
  <div class="auth-header">
    <h1 id="user-welcome">Loading...</h1>
  </div>

  <div id="user-details" style="display: none; text-align: left; width: 100%;" class="auth-form">
    <p><strong>Username:</strong> <span id="display-username"></span></p>
    <p><strong>Email:</strong> <span id="display-email"></span></p>
    <p><strong>Role:</strong> <span id="display-role"></span></p>
  </div>

  <form class="auth-form" style="width: 100%;">
    <button type="button" id="logout-btn" class="primary-btn" style="width: 100%;">Log Out</button>
  </form>

  <p id="user-status" class="status" role="status" aria-live="polite"></p>

  <div class="auth-links text-center">
    <a class="nav-link muted" href="/">Back to home</a>
  </div>
</section>
